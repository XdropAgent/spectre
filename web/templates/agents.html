{% extends "base.html" %}{% block content %}
<div class="page-header"><h1>🤖 Profiling Agents</h1></div>
<div class="agents-grid">
{% for a in agents %}<div class="card agent-card"><div class="agent-card-header"><span class="status-dot green pulse"></span><h3>{{ a.name }}</h3></div><p class="text-muted">{{ a.desc }}</p>
<div class="agent-stats"><div><span class="stat-label">Tokens</span><span class="stat-value">{{ "{:,}".format(a.tokens) }}</span></div><div><span class="stat-label">Runs</span><span class="stat-value">{{ "{:,}".format(a.runs) }}</span></div><div><span class="stat-label">Success</span><span class="stat-value">{{ a.success }}%</span></div><div><span class="stat-label">Avg Time</span><span class="stat-value">{{ a.avg_time }}s</span></div></div></div>{% endfor %}
</div>{% endblock %}
