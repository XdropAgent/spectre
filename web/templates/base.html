<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}SPECTRE{% endblock %} — Runtime Profiler</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
:root{--bg:#0d1117;--card:#161b22;--border:#30363d;--text:#e6edf3;--muted:#8b949e;--blue:#58a6ff;--green:#3fb950;--red:#f85149;--yellow:#d29922;--purple:#bc8cff}*{margin:0;padding:0;box-sizing:border-box}body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;background:var(--bg);color:var(--text);display:flex;min-height:100vh}.sidebar{width:240px;background:var(--card);border-right:1px solid var(--border);padding:20px;position:fixed;height:100vh;overflow-y:auto;z-index:100}.sidebar-brand{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border);margin-bottom:20px}.brand-icon{color:var(--blue);font-size:24px}.brand-text{font-size:18px;font-weight:700}.sidebar-nav{display:flex;flex-direction:column;gap:4px}.nav-item{padding:10px 12px;border-radius:6px;color:var(--muted);text-decoration:none;transition:.2s;font-size:14px}.nav-item:hover,.nav-item.active{background:var(--bg);color:var(--text)}.sidebar-footer{position:absolute;bottom:20px;left:20px;color:var(--muted);font-size:12px}.content{margin-left:240px;padding:30px;flex:1;min-width:0}.page-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;flex-wrap:wrap;gap:12px}.page-header h1{font-size:24px}.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px}.stat-card{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:20px}.stat-label{color:var(--muted);font-size:13px;margin-bottom:4px}.stat-value{font-size:28px;font-weight:700}.stat-value.green{color:var(--green)}.stat-value.yellow{color:var(--yellow)}.stat-value.red{color:var(--red)}.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:20px}.card{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:20px;overflow-x:auto}.card h2{font-size:16px;margin-bottom:16px}.badge{padding:4px 10px;border-radius:12px;font-size:12px;font-weight:600}.badge-green{background:rgba(63,185,80,.15);color:var(--green)}.status-dot{width:8px;height:8px;border-radius:50%;display:inline-block;flex-shrink:0}.status-dot.green{background:var(--green)}.pulse{animation:pulse 2s infinite}@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}.agent-row{display:flex;align-items:center;gap:12px;padding:8px 0;border-bottom:1px solid var(--border)}.agent-name{font-weight:600;min-width:140px}.data-table{width:100%;border-collapse:collapse}.data-table th,.data-table td{padding:10px;text-align:left;border-bottom:1px solid var(--border);white-space:nowrap}.data-table th{color:var(--muted);font-size:13px}.score-badge{padding:2px 8px;border-radius:4px;font-weight:600;font-size:13px}.score-badge.green{background:rgba(63,185,80,.15);color:var(--green)}.score-badge.yellow{background:rgba(210,153,34,.15);color:var(--yellow)}.score-badge.red{background:rgba(248,81,73,.15);color:var(--red)}.text-muted{color:var(--muted)}.text-sm{font-size:14px}.finding-row{display:flex;align-items:center;gap:12px;padding:8px 0;border-bottom:1px solid var(--border)}.severity-badge{padding:2px 8px;border-radius:4px;font-size:11px;font-weight:700;text-transform:uppercase}.severity-badge.critical{background:rgba(248,81,73,.2);color:var(--red)}.severity-badge.high{background:rgba(255,166,87,.2);color:#ffa657}.severity-badge.medium{background:rgba(210,153,34,.2);color:var(--yellow)}.severity-badge.low{background:rgba(88,166,255,.2);color:var(--blue)}.severity-badge.info{background:rgba(139,148,158,.2);color:var(--muted)}.agents-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:16px}.agent-card-header{display:flex;align-items:center;gap:10px;margin-bottom:8px}.agent-stats{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-top:12px}.agent-stats div{display:flex;flex-direction:column}.form-group{margin-bottom:16px}.form-group label{display:block;margin-bottom:6px;color:var(--muted);font-size:13px}.input{width:100%;padding:10px;background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:14px}.code-editor{width:100%;padding:16px;background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--text);font-family:monospace;font-size:14px;resize:vertical;min-height:200px}.checkbox-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}.checkbox-label{display:flex;align-items:center;gap:8px;font-size:14px}.btn{padding:10px 24px;border:none;border-radius:6px;font-size:14px;font-weight:600;cursor:pointer}.btn-primary{background:var(--blue);color:#fff}

/* Mobile nav */
.mobile-nav{display:none;position:fixed;top:0;left:0;right:0;background:var(--card);border-bottom:1px solid var(--border);z-index:200;padding:10px 16px}.mobile-nav-inner{display:flex;align-items:center;justify-content:space-between}.hamburger{background:none;border:1px solid var(--border);border-radius:6px;padding:8px 10px;color:var(--text);font-size:18px;cursor:pointer}.mobile-brand{display:flex;align-items:center;gap:8px}.mobile-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);z-index:99}.mobile-overlay.show{display:block}

@media(max-width:1024px){.stats-grid{grid-template-columns:repeat(2,1fr)}.grid-2,.agents-grid{grid-template-columns:1fr}}
@media(max-width:768px){
.sidebar{transform:translateX(-100%);transition:transform .3s ease}.sidebar.open{transform:translateX(0)}
.mobile-nav{display:block}
.content{margin-left:0;padding:70px 16px 30px 16px}
.stats-grid{grid-template-columns:repeat(2,1fr)}
.page-header h1{font-size:20px}
.stat-value{font-size:22px}
}
@media(max-width:480px){
.stats-grid{grid-template-columns:1fr 1fr}
.stat-card{padding:14px}
}
</style>
</head><body>

<!-- Mobile nav bar -->
<div class="mobile-nav">
<div class="mobile-nav-inner">
<div class="mobile-brand"><span style="color:var(--blue);font-size:20px">◆</span><span style="font-weight:700">SPECTRE</span></div>
<button class="hamburger" onclick="toggleSidebar()">☰</button>
</div>
</div>
<div class="mobile-overlay" id="overlay" onclick="toggleSidebar()"></div>

<aside class="sidebar" id="sidebar">
<div class="sidebar-brand"><span class="brand-icon">◆</span><span class="brand-text">SPECTRE</span></div>
<nav class="sidebar-nav">
<a href="/" class="nav-item {% if request.path == '/' %}active{% endif %}">📊 Dashboard</a>
<a href="/profile" class="nav-item {% if request.path == '/profile' %}active{% endif %}">🔬 Profile</a>
<a href="/agents" class="nav-item {% if request.path == '/agents' %}active{% endif %}">🤖 Agents</a>
<a href="/stats" class="nav-item {% if request.path == '/stats' %}active{% endif %}">📈 Statistics</a>
</nav>
<div class="sidebar-footer">SPECTRE v1.0 | Runtime Profiler</div>
</aside>

<main class="content">{% block content %}{% endblock %}</main>
<script>
function toggleSidebar(){document.getElementById('sidebar').classList.toggle('open');document.getElementById('overlay').classList.toggle('show')}
document.addEventListener('DOMContentLoaded',function(){Chart.defaults.color='#8b949e';Chart.defaults.borderColor='#30363d'});
</script>
</body></html>
