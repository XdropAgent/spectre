{% extends "base.html" %}{% block content %}
<div class="page-header"><h1>📈 Token Statistics</h1></div>
<div class="stats-grid">
<div class="stat-card"><div class="stat-label">Daily Average</div><div class="stat-value">75.2M</div></div>
<div class="stat-card"><div class="stat-label">Monthly Total</div><div class="stat-value">2.26B</div></div>
<div class="stat-card"><div class="stat-label">Cost/Day</div><div class="stat-value">$225.60</div></div>
<div class="stat-card"><div class="stat-label">Plan Required</div><div class="stat-value">1.6B/mo</div></div>
</div>
<div class="grid-2">
<div class="card"><h2>Daily Token Usage</h2><canvas id="dailyChart"></canvas></div>
<div class="card"><h2>Per-Agent Consumption</h2><canvas id="agentChart"></canvas></div>
</div>
<script>
const daily={{ daily_tokens|tojson }};
new Chart(document.getElementById('dailyChart'),{type:'bar',data:{labels:daily.map(d=>d[0].slice(5)),datasets:[{label:'Tokens (M)',data:daily.map(d=>d[1]/1e6),backgroundColor:'#58a6ff'}]}});
new Chart(document.getElementById('agentChart'),{type:'doughnut',data:{labels:{{ agents|map(attribute='name')|list|tojson }},datasets:[{data:{{ agents|map(attribute='tokens')|list|tojson }},backgroundColor:['#58a6ff','#3fb950','#f85149','#d29922','#bc8cff','#f778ba','#79c0ff','#56d364','#ffa657','#d2a8ff']}]}});
</script>{% endblock %}
