{% extends "base.html" %}{% block content %}
<div class="page-header"><h1>🔬 Profile Application</h1></div>
<form method="POST" class="card">
<div class="form-group"><label>Filename</label><input type="text" name="filename" value="app.py" class="input"></div>
<div class="form-group"><label>Code / Trace</label><textarea name="code" class="code-editor" rows="20" placeholder="Paste code or runtime trace data..."></textarea></div>
<div class="form-group"><label>Profiling Agents</label>
<div class="checkbox-grid">{% for a in agents %}<label class="checkbox-label"><input type="checkbox" name="agents" value="{{ a.name }}" checked> {{ a.name }}</label>{% endfor %}</div></div>
<button type="submit" class="btn btn-primary">🚀 Run Profiler</button>
</form>{% endblock %}
